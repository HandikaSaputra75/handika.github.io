<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Binance App Demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0e11;
  color: #eaecef;
}

header {
  padding: 12px;
  border-bottom: 1px solid #1e2329;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

header h1 {
  font-size: 18px;
  color: #f0b90b;
  margin: 0;
}

.container {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 10px;
  padding: 10px;
}

@media(max-width:900px){
  .container { grid-template-columns: 1fr; }
}

.card {
  background: #161a1e;
  border-radius: 8px;
  padding: 10px;
  margin-bottom: 10px;
}

.market-item {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
  cursor: pointer;
}

.market-item:hover { color: #f0b90b; }

.up { color: #0ecb81; }
.down { color: #f6465d; }

input, button {
  width: 100%;
  padding: 6px;
  margin-top: 5px;
  background: #0b0e11;
  border: 1px solid #1e2329;
  color: white;
  border-radius: 4px;
}

button {
  background: #f0b90b;
  color: black;
  cursor: pointer;
}

.timeframe button {
  width: auto;
  margin-right: 4px;
  background: #1e2329;
  color: #eaecef;
}

.timeframe button.active {
  background: #f0b90b;
  color: black;
}

table {
  width: 100%;
  font-size: 12px;
}

footer {
  text-align: center;
  font-size: 11px;
  color: #848e9c;
  padding: 8px;
}
</style>
</head>

<body>

<header>
  <h1>Binance App</h1>
  <span>Demo Portfolio</span>
</header>

<div class="container">

<!-- LEFT -->
<div>
  <div class="card">
    <strong id="pairTitle">BTCUSDT</strong>
    <div class="timeframe">
      <button class="active" onclick="setTF('1')">1m</button>
      <button onclick="setTF('5')">5m</button>
      <button onclick="setTF('60')">1h</button>
      <button onclick="setTF('1D')">1d</button>
    </div>
    <div id="chart" style="height:420px;"></div>
  </div>

  <div class="card">
    <strong>📘 Order Book</strong>
    <table id="orderbook"></table>
  </div>
</div>

<!-- RIGHT -->
<div>

  <div class="card">
    <input placeholder="Search coin..." oninput="filterMarket(this.value)">
  </div>

  <div class="card" id="market"></div>

  <div class="card">
    <strong>⭐ Watchlist</strong>
    <div id="watchlist"></div>
  </div>

  <div class="card">
    <strong>🔔 Price Alert</strong>
    <input id="alertPrice" placeholder="Target price (USD)">
    <button onclick="setAlert()">Set Alert</button>
  </div>

</div>
</div>

<footer>
  Binance Public API • TradingView • Educational Use
</footer>

<script>
let currentPair = "BTCUSDT";
let interval = "1";
let widget;
let allMarket = [];

function loadChart(){
  document.getElementById("pairTitle").innerText = currentPair;
  if(widget) widget.remove();

  widget = new TradingView.widget({
    container_id: "chart",
    symbol: "BINANCE:" + currentPair,
    interval: interval,
    theme: "dark",
    width: "100%",
    height: 420
  });
}

function setTF(tf){
  interval = tf;
  document.querySelectorAll(".timeframe button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  loadChart();
}

async function loadMarket(){
  const res = await fetch("https://api.binance.com/api/v3/ticker/24hr");
  allMarket = (await res.json()).filter(x=>x.symbol.endsWith("USDT")).slice(0,50);
  renderMarket(allMarket);
}

function renderMarket(data){
  const el = document.getElementById("market");
  el.innerHTML = "";
  data.forEach(m=>{
    el.innerHTML += `
      <div class="market-item" onclick="selectPair('${m.symbol}')">
        <span>${m.symbol}</span>
        <span class="${m.priceChangePercent>=0?'up':'down'}">
          ${parseFloat(m.priceChangePercent).toFixed(2)}%
        </span>
      </div>
    `;
  });
}

function filterMarket(q){
  renderMarket(allMarket.filter(m=>m.symbol.includes(q.toUpperCase())));
}

function selectPair(p){
  currentPair = p;
  loadChart();
  loadOrderBook();
}

async function loadOrderBook(){
  const res = await fetch(
    `https://api.binance.com/api/v3/depth?symbol=${currentPair}&limit=5`
  );
  const d = await res.json();
  let html = "<tr><th>Price</th><th>Qty</th></tr>";
  d.bids.forEach(b=>html+=`<tr><td class="up">${b[0]}</td><td>${b[1]}</td></tr>`);
  d.asks.forEach(a=>html+=`<tr><td class="down">${a[0]}</td><td>${a[1]}</td></tr>`);
  document.getElementById("orderbook").innerHTML = html;
}

function setAlert(){
  const p = document.getElementById("alertPrice").value;
  localStorage.setItem("alert", JSON.stringify({pair:currentPair, price:p}));
  alert("✅ Alert disimpan");
}

async function checkAlert(){
  const a = JSON.parse(localStorage.getItem("alert"));
  if(!a) return;
  const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${a.pair}`);
  const d = await r.json();
  if(+d.price >= +a.price){
    alert(`🚨 ${a.pair} tembus $${a.price}`);
    localStorage.removeItem("alert");
  }
}

loadMarket();
loadChart();
loadOrderBook();
setInterval(loadOrderBook,4000);
setInterval(checkAlert,5000);
</script>

</body>
</html>
