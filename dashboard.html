<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Crypto Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
}

header {
  padding: 20px;
  text-align: center;
  background: #020617;
}

h1 {
  margin: 0;
  color: #38bdf8;
}

.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: #020617;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 15px rgba(56,189,248,0.15);
}

.card h2 {
  margin: 0 0 10px;
  color: #38bdf8;
}

.price {
  font-size: 28px;
  font-weight: bold;
}

footer {
  text-align: center;
  padding: 15px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<header>
  <h1>📊 Crypto Market Dashboard</h1>
  <p>Live data from Binance</p>
</header>

<section class="dashboard">
  <div class="card">
    <h2>BTC / USDT</h2>
    <div class="price" id="btc">Loading...</div>
  </div>

  <div class="card">
    <h2>ETH / USDT</h2>
    <div class="price" id="eth">Loading...</div>
  </div>

  <div class="card">
    <h2>BNB / USDT</h2>
    <div class="price" id="bnb">Loading...</div>
  </div>
</section>

<footer>
  Data realtime via Binance Public API<br>
  © 2026 - Handika Dashboard
</footer>

<script>
async function getPrice(symbol, elementId) {
  try {
    const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
    const data = await res.json();
    document.getElementById(elementId).innerText =
      "$" + parseFloat(data.price).toLocaleString();
  } catch (err) {
    document.getElementById(elementId).innerText = "Error";
  }
}

function loadData() {
  getPrice("BTCUSDT", "btc");
  getPrice("ETHUSDT", "eth");
  getPrice("BNBUSDT", "bnb");
}

loadData();
setInterval(loadData, 5000); // update tiap 5 detik
</script>

</body>
</html>
